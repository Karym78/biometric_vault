{% extends "base.html" %}

{% block content %}
<section class="auth-grid">
    <div class="scanner-hero">
        <p class="eyebrow">Fingerprint Scanner Simulation</p>
        <h1>Login with username and fingerprint upload</h1>
        <p class="lead">For the university demo, image upload replaces the physical fingerprint scanner.</p>
        <div class="scanner-frame" aria-hidden="true">
            <div class="scan-line"></div>
            <img src="{{ url_for('static', filename='uploads/demo_fingerprint1.png') }}" alt="">
        </div>
    </div>
    <form class="panel" method="post" enctype="multipart/form-data">
        <label for="username">Username</label>
        <input id="username" name="username" type="text" required autocomplete="username">

        <label for="fingerprint">Fingerprint image</label>
        <input id="fingerprint" name="fingerprint" type="file" accept="image/*" required>

        <button type="submit">Verify and login</button>
        <a class="secondary-link" href="{{ url_for('register') }}">Create a new user</a>
    </form>
</section>
{% endblock %}
